# OmniDocBench v1.6 full-set eval config for the official PaddleOCR-VL
# doc_parser adapter output (Edit_dist + TEDS; CDM disabled).
#
# This is a TEMPLATE: <REPO_ROOT> is replaced with the absolute repo root at
# runtime. Use v16-cdm-official.yaml with the native Windows scorer or WSL scoring path when Formula CDM is needed.
end2end_eval:
  metrics:
    text_block:      { metric: [Edit_dist] }
    display_formula: { metric: [Edit_dist] }
    table:           { metric: [TEDS, Edit_dist], teds_workers: 16 }
    reading_order:   { metric: [Edit_dist] }
  dataset:
    dataset_name: end2end_dataset
    ground_truth: { data_path: <REPO_ROOT>/eval-infra/01-omnidocbench/data/OmniDocBench.json }
    prediction:   { data_path: <REPO_ROOT>/predictions/paddleocrvl_rocm_official_cdm }
    match_method: quick_match
    match_workers: 24
